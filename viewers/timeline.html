<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="../theme.css?v=3">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Recursive I Ching Timeline</title>
<style>
  :root{
          
         
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);color-scheme:light;
    font-family:Inter,system-ui,-apple-system,sans-serif}
  .wrap{display:flex;height:calc(100vh - 52px);min-height:0}
  #stage{flex:1;display:flex;flex-direction:column;min-width:0}
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--line)}
  .toolbar .title{font-weight:700;font-size:14px;margin-right:auto}
  .toolbar .title .sub{color:var(--muted);font-weight:400;font-size:12px}
  .toolbar button,.toolbar label{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .toolbar button:hover{border-color:var(--accent);color:var(--accent)}
  #scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
  svg{display:block;width:100%}
  .axis path,.axis line{stroke:var(--line)}
  .axis text{fill:var(--muted);font-size:11px}
  .gridline{stroke:var(--line);stroke-dasharray:2 4}
  .rail{fill:none;stroke-width:2px;opacity:.55}
  .rowhit{fill:transparent;cursor:pointer}
  .rowhit:hover + .rowg .dname, .rowg:hover .dname{fill:var(--ink-strong)}
  .node{stroke:var(--bg);stroke-width:2px;cursor:pointer}
  .dname{font-size:13.5px;fill:var(--ink);font-weight:600;cursor:pointer}
  .dyear{font-size:11px;fill:#7a2d20;font-weight:600}
  .dbranch{font-size:11px;fill:var(--muted)}
  .dim{opacity:.16}.hot{opacity:1!important}
  .legend{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;font-size:12px}
  .legend .row{display:flex;align-items:center;gap:6px;cursor:pointer}.legend .row.off{opacity:.35}
  .legend .sw{width:11px;height:11px;border-radius:3px}
  aside#detail{width:330px;max-width:84vw;background:var(--panel);border-left:1px solid var(--line);padding:18px;overflow:auto;display:none;position:relative}
  aside#detail.open{display:block}
  aside#detail img{width:100%;max-height:240px;object-fit:contain;background:#f4f1ea;border-radius:8px;margin-bottom:12px}
  aside#detail h2{margin:.2em 0 .1em;font-size:18px}
  aside#detail .when{color:var(--accent);font-size:13px;margin-bottom:10px}
  aside#detail .sec{margin:12px 0;font-size:13.5px;line-height:1.55;color:var(--ink)}
  aside#detail .sec h4{margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  aside#detail .opencards{display:inline-block;margin-top:10px;padding:8px 14px;border:1px solid var(--accent);border-radius:999px;color:var(--accent);text-decoration:none;font-size:13px;font-weight:600}
  /* Top-right X close — dark chip + white glyph, same visible-on-any-background
     pattern as viewers/cards.html's .modal-close (builder, Jul 7 2026: the old
     plain-text × disappeared over light panels / card images). */
  aside#detail .modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;
    background:rgba(45,34,15,0.65);border:1px solid rgba(255,255,255,0.35);color:#fff;font-size:1.1rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s}
  aside#detail .modal-close:hover{background:rgba(255,255,255,0.2)}
  /* Prev/next deck paging — sticky footer bar at the bottom of the detail
     panel, same pattern as viewers/cards.html's .modal-nav-footer. */
  .modal-nav-footer{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;
    gap:1rem;margin:1.25rem -18px -18px;padding:0.7rem 18px;background:var(--panel);border-top:1px solid var(--line)}
  .modal-nav-btn{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:rgba(156,59,42,.1);
    border:1px solid var(--line);color:var(--ink);font-size:1.2rem;cursor:pointer;display:flex;
    align-items:center;justify-content:center;transition:background .15s,opacity .15s}
  .modal-nav-btn:hover:not(:disabled){background:rgba(156,59,42,.35);border-color:var(--accent)}
  .modal-nav-btn:disabled{opacity:.3;cursor:default}
  .modal-counter{font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--muted);white-space:nowrap}
  #err{padding:40px;text-align:center;color:#e07a5f}
  /* embed mode: a clean book figure — no site chrome, no controls, no internal scroll */
  body.embed site-header, body.embed view-switcher, body.embed .lbl-descent{display:none}
  body.embed .wrap{height:auto;display:block}
  body.embed #stage{display:block}
  body.embed #scroll{overflow:visible;flex:none}
  /* in the (light) book, force the embed light regardless of the reader's OS theme */
  body.embed{        }
</style>
</head>
<body>
<script src="../site-header.js?v=46"></script>
<script src="../view-switcher.js?v=12"></script>
<site-header active="timeline"></site-header>
<div class="wrap">
  <div id="stage">
    <div class="toolbar">
      <div class="title">Timeline <span class="sub">— the grammars in this collection, by branch</span></div>
      <view-switcher active="timeline"></view-switcher>
      <button id="flip">↑ Oldest first</button>
    </div>
    <div id="scroll"><svg id="svg"></svg><div id="err" style="display:none"></div></div>
    <div class="legend" id="legend"></div>
  </div>
  <aside id="detail"></aside>
</div>

<script src="dimension-engine.js?v=1"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
// Branch colours mirror grammars/_collection.json's four curated branches (see
// scripts/build_collection.py) — NOT a genealogy: unlike tarot's decks, these
// grammars don't descend from one another, so there is no derives_from rail here.
const BRANCH_RAW={'primary-sources':'#9c3b2a','synthesis':'#3f7a5c','readings':'#6d8ec9'};
const BRANCH_LABEL={'primary-sources':'Primary sources','synthesis':'Synthesis','readings':'Readings'};
const PALETTE=['#9c3b2a','#3f7a5c','#b5651d','#6d8ec9','#9b6dc9','#c96d9b','#6b6457','#4db6ac','#e57373'];

const params=new URLSearchParams(location.search);
const EMBED=params.get('embed');
if(EMBED) document.body.classList.add('embed');
function postHeight(){ if(!EMBED) return; try{ parent.postMessage({type:'icEmbedHeight',h:Math.ceil(document.body.scrollHeight)},'*'); }catch(e){} }
if(EMBED) window.addEventListener('load',()=>setTimeout(postHeight,90));

// The CSS assumes a 52px <site-header>, but the real custom element renders
// taller (and can wrap to more lines on narrow phones) — a fixed calc(100vh -
// 52px) then makes .wrap taller than the actual remaining space, pushing the
// bottom of the detail panel (incl. the new prev/next footer) below the
// viewport. Measure the real header height instead of guessing.
function fitWrap(){
  if(EMBED) return; // embed mode sizes .wrap explicitly (see body.embed .wrap)
  const sh=document.querySelector('site-header');
  const h=(sh&&sh.offsetHeight)||52;
  document.querySelector('.wrap').style.height='calc(100vh - '+h+'px)';
}
fitWrap();
window.addEventListener('resize',fitWrap);
window.addEventListener('orientationchange',()=>setTimeout(fitWrap,200));
let itemMap={}, decks=[], hidden=new Set(), oldestFirst=true, laneField='branch';
let currentPlaced=[]; // display order (chronological, current direction+filters) for prev/next paging
let laneValues=[], colorOf={};   // set by buildLaneFromField()

// Extract a field value from a deck for the current laneField
function laneOf(d){
  if(laneField==='branch') return d.branch||'—';
  return d[laneField]||d.meta?.[laneField]||'—';
}

// Build laneValues + colorOf from current decks + laneField
function buildLaneFromField(){
  const vals=[...new Set(decks.map(laneOf).filter(v=>v&&v!=='—'))].sort(DimensionEngine.smartCmp);
  laneValues=vals.length?vals:['—'];
  colorOf={};
  laneValues.forEach((v,i)=>{ colorOf[v]=laneField==='branch'?(BRANCH_RAW[v]||PALETTE[i%PALETTE.length]):PALETTE[i%PALETTE.length]; });
  colorOf['—']='#6b6457';
}

(async function init(){
  try{
    const SRC='../grammars/_collection.json';
    const r=await fetch(SRC); if(!r.ok) throw new Error('Could not load '+SRC+' ('+r.status+')');
    const col=await r.json(); const grammars=col.grammars||[];
    // Only the grammars with a genuine historical anchor date (set in
    // scripts/build_collection.py's YEARS table) plot here — same honesty rule
    // tarot used for its "Contemporary decks" (undated) grouping: an undated
    // synthesis/casting/reading is real content, just not a timeline node.
    decks=grammars.filter(g=>g.year!=null).map(g=>({
      id:g.slug,name:g.name,when:g.year_label||'',year:g.year,
      branch:g.branch,derives:[],image:g.cover_image_url,
      sections:{'Overview':g.blurb||''}
    }));
    itemMap=Object.fromEntries(decks.map(d=>[d.id,d]));
    // Lane by branch — the only field with more than one value here.
    laneField='branch';
  }catch(e){ document.getElementById('err').style.display='block'; document.getElementById('err').textContent=e.message; return; }
  buildLaneFromField(); buildLegend(); draw();
  window.addEventListener('resize',draw);
  document.getElementById('flip').addEventListener('click',()=>{ oldestFirst=!oldestFirst;
    document.getElementById('flip').textContent=oldestFirst?'↑ Oldest first':'↓ Newest first'; draw(); });
  document.addEventListener('keydown',(e)=>{
    if(!document.getElementById('detail').classList.contains('open')) return;
    if(e.key==='Escape'){ document.getElementById('detail').classList.remove('open'); }
    if(e.key==='ArrowLeft') navigateDeck(-1);
    if(e.key==='ArrowRight') navigateDeck(1);
  });
})();

function visible(){ return decks.filter(d=>!hidden.has(laneOf(d))); }

function draw(){
  const scroll=document.getElementById('scroll');
  const W=Math.max(560, scroll.clientWidth||900);
  const data=visible();
  if(!data.length){ d3.select('#svg').selectAll('*').remove(); return; }
  const years=d3.extent(data,d=>d.year);
  const span=Math.max(1, years[1]-years[0]);
  const PXY=1.9;                                   // px per year → real gaps are visible
  const padTop=42, padBot=40, axisW=56;
  const innerH=Math.max(360, span*PXY);
  const H=padTop+innerH+padBot;
  const y=d3.scaleLinear().domain(years).range(oldestFirst?[padTop,padTop+innerH]:[padTop+innerH,padTop]);
  const lanes=laneValues; // dynamic from buildLaneFromField()
  const rightGutter=110;  // room for the rightmost lane's deck names so they don't clip
  const laneW=(W-axisW-rightGutter)/Math.max(1,lanes.length);
  const laneX=v=>axisW + lanes.indexOf(v)*laneW + laneW*0.18;

  const svg=d3.select('#svg').attr('viewBox',[0,0,W,H]).attr('height',H); svg.selectAll('*').remove();

  // year gridlines + axis (proportional → blank space = real time gaps)
  const nTicks=Math.min(14, Math.max(4, Math.round(span/45)));
  svg.append('g').selectAll('line').data(y.ticks(nTicks)).join('line').attr('class','gridline')
    .attr('x1',axisW).attr('x2',W-8).attr('y1',d=>y(d)).attr('y2',d=>y(d));
  svg.append('g').attr('class','axis').attr('transform',`translate(${axisW},0)`)
    .call(d3.axisLeft(y).tickFormat(d3.format('d')).ticks(nTicks));
  // lane headers (discovered field values)
  svg.append('g').selectAll('text').data(lanes).join('text')
    .attr('x',v=>laneX(v)).attr('y',20).attr('fill',v=>colorOf[v]||'#6b6457')
    .style('font-size','11px').style('font-weight','700')
    .text(v=>(laneField==='branch'?(BRANCH_LABEL[v]||v):v).replace(/\s*\(.*\)/,'').slice(0,14));
  svg.append('g').selectAll('rect').data(lanes).join('rect')   // faint lane tint
    .attr('x',v=>axisW+lanes.indexOf(v)*laneW).attr('y',padTop-8).attr('width',laneW-2).attr('height',innerH+16)
    .attr('fill',v=>colorOf[v]||'#6b6457').attr('opacity',0.04);

  // collision-avoid only within a lane (keeps the time axis honest)
  const minGap=18, laneLast={}; const placed=[];
  data.slice().sort((a,b)=>oldestFirst?a.year-b.year:b.year-a.year).forEach(d=>{
    const lv=laneOf(d);
    let py=y(d.year); const dir=oldestFirst?1:-1;
    if(laneLast[lv]!=null && Math.abs(py-laneLast[lv])<minGap) py=laneLast[lv]+dir*minGap;
    laneLast[lv]=py; placed.push({...d, lv, px:laneX(lv), py});
  });
  currentPlaced=placed;
  const byId=Object.fromEntries(placed.map(p=>[p.id,p]));

  // No descent rail: unlike tarot's decks, these grammars don't derive from one
  // another (see the BRANCH_RAW comment above) — byId is kept for a possible
  // future use but no edges are drawn.
  void byId;

  const g=svg.append('g').selectAll('g.rowg').data(placed).join('g').attr('class','rowg')
    .attr('transform',d=>`translate(${d.px},${d.py})`);
  g.append('circle').attr('class','node').attr('r',6).attr('fill',d=>colorOf[d.lv]||'#6b6457');
  const dn=g.append('text').attr('class','dname').attr('x',10).attr('dy','0.32em');
  dn.append('tspan').text(d=>d.name.replace(/\s+[—–-]\s+.*/,'').replace(/\s*\([^)]*\)/g,'').trim().slice(0,30));
  dn.append('tspan').attr('class','dyear').attr('dx','7').text(d=>d.year);
  g.on('click',(ev,d)=>{ev.stopPropagation();showDetail(d);})
   .on('mouseenter',(ev,d)=>trace(d.id,g))
   .on('mouseleave',()=>{g.classed('dim',false).classed('hot',false);svg.selectAll('.rail').classed('dim',false);});

  svg.on('click',()=>document.getElementById('detail').classList.remove('open'));
  postHeight();
}

function trace(id,g){
  const keep=new Set([id]); const stack=[id];
  while(stack.length){ const x=stack.pop(); (itemMap[x]?.metadata?.derives_from||[]).forEach(s=>{ if(!keep.has(s)){keep.add(s);stack.push(s);} }); }
  g.classed('dim',d=>!keep.has(d.id)).classed('hot',d=>keep.has(d.id));
  d3.selectAll('.rail').classed('dim',true);
}

function mdToHtml(s){ if(!s) return ''; return String(s).split(/\n{2,}/).map(p=>`<p style="margin:.4em 0">${p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</p>`).join(''); }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function navigateDeck(direction){
  if(!currentPlaced.length) return;
  const curId=(document.getElementById('detail').dataset||{}).deckId;
  const currentIndex=currentPlaced.findIndex(p=>p.id===curId);
  if(currentIndex===-1) return;
  const newIndex=Math.max(0,Math.min(currentPlaced.length-1,currentIndex+direction));
  if(newIndex!==currentIndex) showDetail(currentPlaced[newIndex]);
}
function showDetail(d){
  const el=document.getElementById('detail'); const slug=d.id;
  el.dataset.deckId=d.id;
  let html=`<span class="modal-close" onclick="document.getElementById('detail').classList.remove('open')" title="Close" aria-label="Close">&times;</span>`;
  if(d.image) html+=`<img src="${esc(d.image)}" alt="${esc(d.name)}" loading="lazy">`;
  html+=`<h2>${esc(d.name)}</h2><div class="when">${esc(d.when)} · ${d.year}</div>`;
  for(const [k,v] of Object.entries(d.sections)){ if(v) html+=`<div class="sec"><h4>${esc(k)}</h4>${mdToHtml(String(v))}</div>`; }
  if(slug) html+=`<a class="opencards" href="cards.html?src=${encodeURIComponent('../grammars/'+slug+'/grammar.json')}">Open ${esc(d.name.replace(/\s+[—–-].*/,''))} cards →</a>`;
  // Prev/next footer — page decks in the same chronological order the timeline
  // rail draws them, so ← / → steps the same direction the eye reads it.
  const idx=currentPlaced.findIndex(p=>p.id===d.id), total=currentPlaced.length;
  if(total>1 && idx!==-1){
    html+=`<div class="modal-nav-footer">
      <button class="modal-nav-btn" onclick="navigateDeck(-1)" ${idx<=0?'disabled':''} title="Previous deck (←)" aria-label="Previous deck">&#8592;</button>
      <span class="modal-counter">${idx+1} of ${total}</span>
      <button class="modal-nav-btn" onclick="navigateDeck(1)" ${idx>=total-1?'disabled':''} title="Next deck (→)" aria-label="Next deck">&#8594;</button>
    </div>`;
  }
  el.innerHTML=html; el.classList.add('open');
}
function buildLegend(){
  const lg=document.getElementById('legend'); lg.innerHTML='';
  laneValues.forEach(v=>{ const row=document.createElement('div'); row.className='row'+(hidden.has(v)?' off':'');
    const label=laneField==='branch'?(BRANCH_LABEL[v]||v):v;
    row.innerHTML=`<span class="sw" style="background:${colorOf[v]||'#6b6457'}"></span><span>${label}</span>`;
    row.onclick=()=>{hidden.has(v)?hidden.delete(v):hidden.add(v);buildLegend();draw();}; lg.appendChild(row); });
}
</script>

<script src="../site-footer.js"></script>
<site-footer base="../"></site-footer>
</body>
</html>
